name: docker-publish

# Triggered when release-please cuts a release on main (it auto-publishes a
# GitHub release on merge of the release PR). Also wirable manually.
#
# Security note: this workflow only consumes trusted GitHub contexts
# (github.actor, github.repository_owner, github.event_name, matrix values,
# secrets.GITHUB_TOKEN). No PR/issue/commit-message inputs flow into `run:`,
# so the standard command-injection class doesn't apply here.
on:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: api
                      file: .docker/api.Dockerfile
                    - image: worker
                      file: .docker/worker.Dockerfile
                    - image: migrator
                      file: .docker/migrator.Dockerfile
                    - image: fe
                      file: .docker/fe/Dockerfile
        steps:
            - uses: actions/checkout@v4
            - name: Lowercase repo owner
              id: repo
              env:
                  OWNER: ${{ github.repository_owner }}
              run: |
                  echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ steps.repo.outputs.owner_lc }}/my-family-${{ matrix.image }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ${{ matrix.file }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # OCI args consumed by each Dockerfile's runtime stage
                  # (see ARG OCI_SOURCE / OCI_REVISION / OCI_CREATED + LABEL).
                  build-args: |
                      OCI_SOURCE=https://github.com/${{ github.repository }}
                      OCI_REVISION=${{ github.sha }}
                      OCI_CREATED=${{ github.event.release.published_at || github.event.repository.updated_at }}
                  cache-from: type=gha,scope=${{ matrix.image }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.image }}
