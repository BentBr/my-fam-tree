name: docker-publish

# Reusable image build+push. Called inline by the Release Please workflow when
# it creates a release (see .github/workflows/release-please.yml), so a single
# "merge the release PR" action releases AND publishes the images. Also
# dispatchable manually for a one-off re-publish.
#
# NOTE: this is intentionally NOT triggered by `on: release`. release-please
# publishes the GitHub Release using GITHUB_TOKEN, and events raised by
# GITHUB_TOKEN do not trigger other workflows — so a `release` trigger would
# never fire. Calling this workflow inline from the release-please run (which
# IS triggered by the human merge → normal push to main) sidesteps that.
#
# Security note: only trusted contexts (github.actor, github.repository_owner,
# secrets.GITHUB_TOKEN, the typed `version` input, matrix values) reach `run:`.
on:
    workflow_call:
        inputs:
            version:
                description: "Semver to tag the images with, e.g. 0.1.2 (no leading v)."
                required: true
                type: string
    workflow_dispatch:
        inputs:
            version:
                description: "Semver to tag the images with, e.g. 0.1.2 (no leading v)."
                required: true
                type: string

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                # Exactly three published images. The migrator (`run_migrations`)
                # and seeder (`seed`) binaries are bundled into the api image, so
                # they are NOT published as separate images.
                include:
                    -   image: api
                        file: .docker/api.Dockerfile
                    -   image: worker
                        file: .docker/worker.Dockerfile
                    -   image: fe
                        file: .docker/fe/Dockerfile
        steps:
            -   uses: actions/checkout@v4
            -   name: Lowercase repo owner
                id: repo
                env:
                    OWNER: ${{ github.repository_owner }}
                run: |
                    echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
            -   uses: docker/setup-buildx-action@v4
            -   uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Extract metadata
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ghcr.io/${{ steps.repo.outputs.owner_lc }}/my-fam-tree-${{ matrix.image }}
                    # The version is passed explicitly (release-please emits a clean
                    # `0.1.2`, not the `core-v0.1.2` git tag), so we tag by raw value
                    # rather than parsing semver from the ref.
                    tags: |
                        type=raw,value=${{ inputs.version }}
                        type=raw,value=latest
            -   name: Build and push
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: ${{ matrix.file }}
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    # OCI args consumed by each Dockerfile's runtime stage
                    # (see ARG OCI_SOURCE / OCI_REVISION + LABEL).
                    build-args: |
                        OCI_SOURCE=https://github.com/${{ github.repository }}
                        OCI_REVISION=${{ github.sha }}
                    cache-from: type=gha,scope=${{ matrix.image }}
                    cache-to: type=gha,mode=max,scope=${{ matrix.image }}
