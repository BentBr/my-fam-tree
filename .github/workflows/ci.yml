name: ci

on:
    pull_request:
    push:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    SQLX_OFFLINE: "true"
    RUSTFLAGS: "-D warnings"

# `contents: write` is required for the backend-coverage job to push the
# coverage badge JSON to the gh-pages branch. All other jobs are
# read-only; granting at workflow level is simpler than per-job and the
# push is gated by `if: github.event_name == 'push' && github.ref == 'refs/heads/main'`.
permissions:
    contents: write

jobs:
    # ============================================================================
    # Detect which parts of the codebase changed. On push to main we run
    # everything (paths-filter can't compare to a base ref there).
    # ============================================================================
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend || steps.default.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend || steps.default.outputs.frontend }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - if: ${{ github.event_name == 'pull_request' }}
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      # Any change to CI/infra files flips BOTH groups so the
                      # full pipeline runs (workflow/docker/compose/scripts
                      # changes must exercise everything — otherwise a broken
                      # CI yaml could merge with all jobs skipped).
                      infra: &infra
                          - '.github/workflows/**'
                          - '.docker/**'
                          - '.dockerignore'
                          - 'compose.yaml'
                          - 'scripts/**'
                          - 'release-please-config.json'
                          - '.release-please-manifest.json'
                      backend:
                          - *infra
                          - 'crates/**'
                          - 'migrations/**'
                          - 'Cargo.toml'
                          - 'Cargo.lock'
                          - '.sqlx/**'
                          - 'deny.toml'
                          - 'rust-toolchain.toml'
                      frontend:
                          - *infra
                          - 'fe/**'
            - if: ${{ github.event_name != 'pull_request' }}
              id: default
              run: |
                  echo "backend=true" >> "$GITHUB_OUTPUT"
                  echo "frontend=true" >> "$GITHUB_OUTPUT"

    # ============================================================================
    # Commit Lint - Validates Conventional Commits on every PR
    # ============================================================================
    commit-lint:
        if: ${{ github.event_name == 'pull_request' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Validate Conventional Commits
              env:
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
              run: |
                  conventional_pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .+'
                  merge_pattern='^Merge '
                  invalid_commits=()
                  while IFS= read -r commit_sha; do
                      [[ -z "$commit_sha" ]] && continue
                      subject="$(git log -1 --format='%s' "$commit_sha")"
                      if [[ "$subject" =~ $merge_pattern ]]; then
                          continue
                      fi
                      if ! [[ "$subject" =~ $conventional_pattern ]]; then
                          invalid_commits+=("$commit_sha: $subject")
                      fi
                  done < <(git rev-list "$BASE_SHA..$HEAD_SHA")

                  if [[ ${#invalid_commits[@]} -gt 0 ]]; then
                      echo "::error::The following commits do not follow Conventional Commits format:"
                      for msg in "${invalid_commits[@]}"; do
                          echo "  - $msg"
                      done
                      echo ""
                      echo "Expected format: <type>[optional scope][!]: <description>"
                      echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
                      exit 1
                  fi
                  echo "All commits follow Conventional Commits format"

    # ============================================================================
    # Branch Name Validation - Runs on every PR
    # ============================================================================
    branch-name:
        if: ${{ github.event_name == 'pull_request' }}
        runs-on: ubuntu-latest
        steps:
            - name: Validate branch name
              env:
                  BRANCH_NAME: ${{ github.head_ref }}
              run: |
                  regex='^(main|master|develop|(release-please|dependabot|renovate)(--|/).+|(feat|fix|hotfix|chore|docs|refactor|perf|test|build|ci|style|revert|release)/[a-z0-9][a-z0-9._-]*)$'
                  if [[ ! "$BRANCH_NAME" =~ $regex ]]; then
                      echo "::error::Branch name '$BRANCH_NAME' does not follow the naming convention."
                      echo ""
                      echo "Expected: <type>/<description>"
                      echo "Types: feat, fix, hotfix, chore, docs, refactor, perf, test, build, ci, style, revert, release"
                      echo "Description: lowercase alphanumeric + . _ - (must start alphanumeric; no uppercase)"
                      echo ""
                      echo "Exempt branches: main, master, develop, release-please--*, dependabot/*, renovate/*"
                      exit 1
                  fi
                  echo "Branch name '$BRANCH_NAME' is valid"

    # ============================================================================
    # Backend prepare - warm cargo caches + cargo-bin tools once. Downstream
    # backend jobs reuse the cargo build cache via swatinem/rust-cache@v2.
    # ============================================================================
    backend-prepare:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
            - name: Cache cargo bin
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/bin
                  key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-bin-
            - name: Install cargo-deny
              run: |
                  if ! command -v cargo-deny >/dev/null 2>&1; then
                      cargo install cargo-deny --locked
                  fi
            - name: Install sqlx-cli
              run: |
                  if ! command -v sqlx >/dev/null 2>&1; then
                      cargo install sqlx-cli --no-default-features --features postgres --locked
                  fi
            - name: Install cargo-llvm-cov
              run: |
                  if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
                      cargo install cargo-llvm-cov --locked
                  fi

    backend-clippy:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: clippy
            - uses: Swatinem/rust-cache@v2
            - run: cargo clippy --workspace --all-targets -- -D warnings

    backend-format:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rustfmt
            - run: cargo fmt --all -- --check

    backend-audit:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - name: Restore cargo bin
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/bin
                  key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-bin-
            - name: Install cargo-deny
              run: |
                  if ! command -v cargo-deny >/dev/null 2>&1; then
                      cargo install cargo-deny --locked
                  fi
            - run: cargo deny check

    backend-tests:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: my_family
                    POSTGRES_PASSWORD: my_family
                    POSTGRES_DB: my_family
                ports: ["3458:5432"]
                options: >-
                    --health-cmd "pg_isready -U my_family"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            mailpit:
                image: axllent/mailpit:latest
                ports: ["1025:1025", "8025:8025"]
        env:
            DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
            REDIS_URL: redis://localhost:6379/0
            EMAIL_DSN: smtp://localhost:1025
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - run: cargo test --workspace --all-targets

    backend-build:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - run: cargo build --workspace --all-targets

    backend-coverage:
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: my_family
                    POSTGRES_PASSWORD: my_family
                    POSTGRES_DB: my_family
                ports: ["3458:5432"]
                options: >-
                    --health-cmd "pg_isready -U my_family"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            mailpit:
                image: axllent/mailpit:latest
                ports: ["1025:1025", "8025:8025"]
        env:
            DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
            REDIS_URL: redis://localhost:6379/0
            EMAIL_DSN: smtp://localhost:1025
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: llvm-tools-preview
            - uses: Swatinem/rust-cache@v2
            - name: Restore cargo bin
              uses: actions/cache@v4
              with:
                  path: ~/.cargo/bin
                  key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-bin-
            - name: Install cargo-llvm-cov
              run: |
                  if ! command -v cargo-llvm-cov >/dev/null 2>&1; then
                      cargo install cargo-llvm-cov --locked
                  fi
            # Exclusion regex + threshold live in scripts/coverage.sh — single
            # source of truth for both CI and local `rdt coverage`.
            - name: Run coverage (profdata + LCOV + JSON)
              run: |
                  ./scripts/coverage.sh profile
                  ./scripts/coverage.sh lcov
                  ./scripts/coverage.sh json
            - name: Append coverage summary to GitHub step summary
              run: |
                  {
                      echo "## Rust coverage"
                      echo ""
                      echo '```'
                      ./scripts/coverage.sh summary
                      echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"
            - name: Enforce coverage threshold
              run: ./scripts/coverage.sh check
            - uses: actions/upload-artifact@v4
              with:
                  name: rust-coverage
                  path: |
                      coverage/rust.lcov
                      coverage/rust.json
                  retention-days: 14
            - name: Publish coverage badge to gh-pages
              # Only on push to main: avoids gh-pages churn during PR runs and
              # avoids cross-fork token issues. Uses GITHUB_TOKEN with the
              # default contents:write granted at the workflow level (no PAT).
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
              run: |
                  PCT=$(jq -r '.data[0].totals.lines.percent | tostring | .[0:5]' coverage/rust.json)
                  COLOR=$(awk -v p="$PCT" 'BEGIN{
                      if (p+0 >= 90) print "brightgreen";
                      else if (p+0 >= 80) print "green";
                      else if (p+0 >= 70) print "yellowgreen";
                      else if (p+0 >= 60) print "yellow";
                      else if (p+0 >= 50) print "orange";
                      else print "red";
                  }')
                  printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > /tmp/coverage.json

                  # Clone gh-pages (or initialize it if it doesn't exist yet).
                  cd /tmp
                  rm -rf pages
                  if git clone --branch gh-pages --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" pages 2>/dev/null; then
                      cd pages
                  else
                      mkdir pages && cd pages
                      git init -b gh-pages
                      git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
                  fi
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  cp /tmp/coverage.json coverage.json
                  git add coverage.json
                  if git diff --staged --quiet; then
                      echo "coverage unchanged — skipping push"
                  else
                      git commit -m "chore(coverage): update badge to ${PCT}%"
                      git push origin gh-pages
                  fi

    backend-ts-bindings:
        name: TS bindings up to date
        needs: [changes, backend-prepare]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - name: Dump live OpenAPI
              run: cargo run -p my-family-openapi --bin openapi-dump > /tmp/openapi.json
            - name: Diff against committed fe/openapi.json
              run: diff -u fe/openapi.json /tmp/openapi.json

    # ============================================================================
    # Frontend prepare - install deps once into the repo-local pnpm store.
    # Downstream FE jobs do `pnpm install --frozen-lockfile` again; pnpm reuses
    # the cached store via fe/.npmrc (`store-dir=.pnpm-store`).
    # ============================================================================
    frontend-prepare:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            # setup-node's built-in pnpm cache assumes a global store at
            # ~/.local/share/pnpm/store; ours lives at fe/.pnpm-store
            # (fe/.npmrc). Cache the repo-local store directly.
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - run: cd fe && pnpm install --frozen-lockfile

    frontend-lint:
        needs: [changes, frontend-prepare]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm openapi-codegen
            - run: cd fe && pnpm lint

    frontend-typecheck:
        needs: [changes, frontend-prepare]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm openapi-codegen
            - run: cd fe && pnpm typecheck

    frontend-tests:
        needs: [changes, frontend-prepare]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm openapi-codegen
            # Vitest only - Playwright runs in the frontend-e2e job.
            - run: cd fe && pnpm test

    frontend-build:
        needs: [changes, frontend-prepare]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm openapi-codegen
            - run: cd fe && pnpm build

    # ============================================================================
    # Frontend E2E - full stack: cargo build api + pnpm dev + Playwright.
    # Triggered when either backend or frontend changed (the wire crosses both).
    # ============================================================================
    frontend-e2e:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: my_family
                    POSTGRES_PASSWORD: my_family
                    POSTGRES_DB: my_family
                ports: ["3458:5432"]
                options: >-
                    --health-cmd "pg_isready -U my_family"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            mailpit:
                image: axllent/mailpit:latest
                ports: ["1025:1025", "8025:8025"]
        env:
            RUN_ID: ${{ github.run_id }}
            APP_ENV: development
            LOG_FORMAT: pretty
            RUST_LOG: info,my_family=debug
            DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
            DATABASE_MAX_CONNECTIONS: "20"
            DATABASE_ACQUIRE_TIMEOUT_SECONDS: "5"
            DATABASE_STATEMENT_TIMEOUT_MS: "30000"
            REDIS_URL: redis://localhost:6379/0
            REDIS_MAX_CONNECTIONS: "10"
            REDIS_KEY_PREFIX: "my-family:"
            EMAIL_DSN: smtp://localhost:1025
            EMAIL_FROM_NAME: my-family
            EMAIL_FROM_ADDRESS: no-reply@my-family.local
            EMAIL_TIMEOUT_SECONDS: "10"
            API_HOST: 127.0.0.1
            API_PORT: "8080"
            API_PUBLIC_URL: http://localhost:8080
            WEB_PUBLIC_URL: http://localhost:5173
            CORS_ALLOWED_ORIGINS: http://localhost:5173
            API_ENABLE_DOCS: "true"
            API_METRICS_BIND: 127.0.0.1:9090
            COOKIE_DOMAIN: ""
            COOKIE_SECURE: "false"
            COOKIE_SAMESITE_ACCESS: Lax
            COOKIE_SAMESITE_REFRESH: Strict
            JWT_ISSUER: my-family
            JWT_AUDIENCE: my-family-app
            JWT_ACCESS_TTL_SECONDS: "900"
            JWT_REFRESH_TTL_SECONDS: "2592000"
            JWT_REFRESH_ABSOLUTE_TTL_SECONDS: "7776000"
            MAGIC_LINK_TTL_SECONDS: "900"
            INVITE_TTL_SECONDS: "1209600"
            MAGIC_LINK_RATE_PER_EMAIL_PER_HOUR: "5"
            MAGIC_LINK_RATE_PER_IP_PER_HOUR: "20"
            VITE_API_BASE_URL: http://localhost:8080
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - uses: actions/cache@v4
              with:
                  path: fe/.pnpm-store
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-
            - name: Generate Ed25519 JWT keypair into .env
              # gen-jwt-keys emits JWT_PRIVATE_KEY='-----BEGIN…\n…\n-----END…'
              # — single-quoted with literal `\n` sequences. Writing that
              # through $GITHUB_ENV mangles the multi-line content (quotes
              # bleed in / NUL byte). The api binary reads `.env` via dotenvy
              # when APP_ENV=development, which handles single-quoted values
              # correctly. Write directly to `.env` so the api process picks
              # them up at startup; no shell env round-trip.
              run: |
                  cargo run -p my-family-api --bin gen-jwt-keys -- "ci-${RUN_ID}" > /tmp/jwt.env
                  grep -E '^JWT_' /tmp/jwt.env >> .env
            - name: Apply database migrations
              # Without this the api boots and immediately 500s on every
              # endpoint that touches a table (`relation "users" does not
              # exist`). Uses the same DATABASE_URL the api process will pick
              # up from the workflow env block.
              run: cargo run -p my-family-migrator --bin run_migrations
            - name: Build api binary
              # Debug profile is fine for an e2e - release would add minutes
              # for no behavior difference.
              run: cargo build -p my-family-api --bin api
            - name: Start api in background
              run: |
                  ./target/debug/api > /tmp/api.log 2>&1 &
                  echo "API_PID=$!" >> "$GITHUB_ENV"
                  for i in $(seq 1 30); do
                      curl -fsS http://localhost:8080/api/v1/health >/dev/null && break
                      echo "waiting for api..."
                      sleep 2
                  done
            - name: Install FE deps + regenerate openapi types
              working-directory: fe
              run: |
                  pnpm install --frozen-lockfile
                  pnpm openapi-codegen
            - name: Install Playwright Chromium
              working-directory: fe
              run: pnpm exec playwright install --with-deps chromium
            - name: Start Vite dev server in background
              working-directory: fe
              run: |
                  pnpm dev > /tmp/vite.log 2>&1 &
                  echo "VITE_PID=$!" >> "$GITHUB_ENV"
                  for i in $(seq 1 30); do
                      curl -fsS http://localhost:5173/ >/dev/null && break
                      echo "waiting for vite..."
                      sleep 2
                  done
            - name: Run Playwright E2E
              working-directory: fe
              env:
                  E2E_BASE_URL: http://localhost:5173
                  E2E_API_BASE_URL: http://localhost:8080
                  E2E_DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
                  MAILPIT_URL: http://localhost:8025
              run: pnpm test:e2e
            - if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: fe/playwright-report/
                  retention-days: 7
            - if: always()
              name: Upload api + vite logs
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-logs
                  path: |
                      /tmp/api.log
                      /tmp/vite.log
                  retention-days: 7

    # ============================================================================
    # Docker build verification - confirm all 4 Dockerfiles still build. We
    # `load: true` (don't push) so this is a pure build smoke test.
    # ============================================================================
    docker-build:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Build api image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/api.Dockerfile
                  push: false
                  load: true
                  tags: my-family/api:ci
                  cache-from: type=gha,scope=api
                  cache-to: type=gha,mode=max,scope=api
            - name: Build worker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/worker.Dockerfile
                  push: false
                  load: true
                  tags: my-family/worker:ci
                  cache-from: type=gha,scope=worker
                  cache-to: type=gha,mode=max,scope=worker
            - name: Build migrator image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/migrator.Dockerfile
                  push: false
                  load: true
                  tags: my-family/migrator:ci
                  cache-from: type=gha,scope=migrator
                  cache-to: type=gha,mode=max,scope=migrator
            - name: Build fe image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/fe/Dockerfile
                  push: false
                  load: true
                  tags: my-family/fe:ci
                  cache-from: type=gha,scope=fe
                  cache-to: type=gha,mode=max,scope=fe

    # ============================================================================
    # CI Gate - one aggregating check for branch protection. Always runs;
    # fails if any required upstream job failed. Skipped jobs (path filter)
    # don't fail the gate.
    # ============================================================================
    ci-gate:
        needs:
            - changes
            - branch-name
            - commit-lint
            - backend-clippy
            - backend-format
            - backend-audit
            - backend-tests
            - backend-build
            - backend-coverage
            - backend-ts-bindings
            - frontend-lint
            - frontend-typecheck
            - frontend-tests
            - frontend-build
            - frontend-e2e
            - docker-build
        if: ${{ always() }}
        runs-on: ubuntu-latest
        steps:
            # Strict: every upstream job that was *required to run* must report
            # `success`. `skipped` is treated as failure when the change filter
            # says the group is in scope. If we're triggered by a docs-only PR
            # that doesn't match any filter, all jobs skip and the gate also
            # passes — but that scenario is only reachable when no infra,
            # backend, or frontend paths matched (see the path-filter above —
            # infra changes flip BOTH groups).
            - name: Enforce all upstream jobs
              env:
                  BRANCH_NAME_RESULT: ${{ needs.branch-name.result }}
                  COMMIT_LINT_RESULT: ${{ needs.commit-lint.result }}
                  BACKEND_NEEDED: ${{ needs.changes.outputs.backend }}
                  FRONTEND_NEEDED: ${{ needs.changes.outputs.frontend }}
                  BACKEND_CLIPPY: ${{ needs.backend-clippy.result }}
                  BACKEND_FORMAT: ${{ needs.backend-format.result }}
                  BACKEND_AUDIT: ${{ needs.backend-audit.result }}
                  BACKEND_TESTS: ${{ needs.backend-tests.result }}
                  BACKEND_BUILD: ${{ needs.backend-build.result }}
                  BACKEND_COVERAGE: ${{ needs.backend-coverage.result }}
                  BACKEND_TS_BINDINGS: ${{ needs.backend-ts-bindings.result }}
                  FRONTEND_LINT: ${{ needs.frontend-lint.result }}
                  FRONTEND_TYPECHECK: ${{ needs.frontend-typecheck.result }}
                  FRONTEND_TESTS: ${{ needs.frontend-tests.result }}
                  FRONTEND_BUILD: ${{ needs.frontend-build.result }}
                  FRONTEND_E2E: ${{ needs.frontend-e2e.result }}
                  DOCKER_BUILD: ${{ needs.docker-build.result }}
                  EVENT_NAME: ${{ github.event_name }}
              run: |
                  set -e
                  fail=0
                  require_success() {
                      local name="$1"; local result="$2"
                      if [[ "$result" != "success" ]]; then
                          echo "::error::Required job '$name' did not succeed (result=$result)"
                          fail=1
                      else
                          echo "✓ $name"
                      fi
                  }
                  # PR-only gates
                  if [[ "$EVENT_NAME" == "pull_request" ]]; then
                      require_success branch-name "$BRANCH_NAME_RESULT"
                      require_success commit-lint "$COMMIT_LINT_RESULT"
                  fi
                  # Backend group (also covers docker-build + e2e since infra
                  # flips both groups together)
                  if [[ "$BACKEND_NEEDED" == "true" ]]; then
                      require_success backend-clippy       "$BACKEND_CLIPPY"
                      require_success backend-format       "$BACKEND_FORMAT"
                      require_success backend-audit        "$BACKEND_AUDIT"
                      require_success backend-tests        "$BACKEND_TESTS"
                      require_success backend-build        "$BACKEND_BUILD"
                      require_success backend-coverage     "$BACKEND_COVERAGE"
                      require_success backend-ts-bindings  "$BACKEND_TS_BINDINGS"
                  fi
                  # Frontend group
                  if [[ "$FRONTEND_NEEDED" == "true" ]]; then
                      require_success frontend-lint        "$FRONTEND_LINT"
                      require_success frontend-typecheck   "$FRONTEND_TYPECHECK"
                      require_success frontend-tests       "$FRONTEND_TESTS"
                      require_success frontend-build       "$FRONTEND_BUILD"
                  fi
                  # E2E + docker-build run when either group is in scope
                  if [[ "$BACKEND_NEEDED" == "true" || "$FRONTEND_NEEDED" == "true" ]]; then
                      require_success frontend-e2e         "$FRONTEND_E2E"
                      require_success docker-build         "$DOCKER_BUILD"
                  else
                      echo "No backend or frontend changes — nothing required to check."
                  fi
                  if [[ $fail -eq 1 ]]; then
                      echo "::error::CI gate failed"
                      exit 1
                  fi
                  echo "CI gate passed"
