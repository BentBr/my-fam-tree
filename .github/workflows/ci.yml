name: ci

on:
    pull_request:
    push:
        branches: [main]

env:
    CARGO_TERM_COLOR: always
    SQLX_OFFLINE: "true"
    RUSTFLAGS: "-D warnings"

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: rustfmt, clippy
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: fe/pnpm-lock.yaml
            - uses: Swatinem/rust-cache@v2
            - run: cargo fmt --all -- --check
            - run: cargo clippy --workspace --all-targets -- -D warnings
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm lint
            - run: cd fe && pnpm typecheck
            - run: ./scripts/check-file-size.sh

    rust-test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: my_family
                    POSTGRES_PASSWORD: my_family
                    POSTGRES_DB: my_family
                ports: ["5432:5432"]
                options: >-
                    --health-cmd "pg_isready -U my_family"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            mailpit:
                image: axllent/mailpit:latest
                ports: ["1025:1025", "8025:8025"]
        env:
            DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
            REDIS_URL: redis://localhost:6379/0
            EMAIL_DSN: smtp://localhost:1025
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - run: cargo test --workspace --all-targets

    fe-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: fe/pnpm-lock.yaml
            - run: cd fe && pnpm install --frozen-lockfile
            - run: cd fe && pnpm exec playwright install --with-deps chromium
            - run: cd fe && pnpm test

    e2e:
        runs-on: ubuntu-latest
        needs: [lint, rust-test, fe-test]
        env:
            RUN_ID: ${{ github.run_id }}
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - name: Seed .env with required vars + fresh JWT keys
              run: |
                  cp .env.example .env
                  cargo run -p my-family-api --bin gen-jwt-keys -- "ci-${RUN_ID}" >> .env
            - name: Bring up the stack with the e2e profile
              run: docker compose up -d --wait
            - name: Wait for FE container
              run: |
                  for i in $(seq 1 30); do
                      docker compose exec -T fe wget -qO- http://localhost:5173/ >/dev/null && break || sleep 2
                  done
            - name: Run Playwright E2E
              run: docker compose run --rm -T playwright pnpm test:e2e
            - if: always()
              name: Capture docker logs
              run: docker compose logs > docker-logs.txt
            - if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: docker-logs
                  path: docker-logs.txt
                  retention-days: 7
            - if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: fe/playwright-report/
                  retention-days: 7
            - if: always()
              run: docker compose down -v

    coverage:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_USER: my_family
                    POSTGRES_PASSWORD: my_family
                    POSTGRES_DB: my_family
                ports: ["5432:5432"]
                options: >-
                    --health-cmd "pg_isready -U my_family"
                    --health-interval 5s --health-timeout 3s --health-retries 10
            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
        env:
            DATABASE_URL: postgres://my_family:my_family@localhost:3458/my_family
            REDIS_URL: redis://localhost:6379/0
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
              with:
                  components: llvm-tools-preview
            - uses: Swatinem/rust-cache@v2
            - run: cargo install cargo-llvm-cov --locked
            - run: cargo llvm-cov --workspace --lcov --output-path coverage/rust.lcov
            - uses: codecov/codecov-action@v4
              with:
                  files: coverage/rust.lcov
                  flags: rust
                  fail_ci_if_error: false

    openapi-drift:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - uses: Swatinem/rust-cache@v2
            - run: cargo run -p my-family-openapi --bin openapi-dump > /tmp/openapi.json
            - run: diff -u fe/openapi.json /tmp/openapi.json

    deny:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@nightly
            - run: cargo install cargo-deny cargo-machete --locked
            - run: cargo deny check
            - run: cargo machete

    docker-build:
        runs-on: ubuntu-latest
        needs: [lint, rust-test, fe-test, e2e]
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Build api image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/api.Dockerfile
                  push: false
                  load: true
                  tags: my-family/api:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Build worker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/worker.Dockerfile
                  push: false
                  load: true
                  tags: my-family/worker:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            - name: Build migrator image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: .docker/migrator.Dockerfile
                  push: false
                  load: true
                  tags: my-family/migrator:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
