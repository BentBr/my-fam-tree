name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            version: ${{ steps.release.outputs['.--version'] }}
            prs_created: ${{ steps.release.outputs.prs_created }}
            prs: ${{ steps.release.outputs.prs }}
            pr_head_sha: ${{ steps.get-pr-sha.outputs.sha }}
        steps:
            -   uses: googleapis/release-please-action@v4
                id: release
                with:
                    config-file: release-please-config.json
                    manifest-file: .release-please-manifest.json

            # release-please updates its release PR via GITHUB_TOKEN, and (by
            # GitHub's anti-recursion rule) GITHUB_TOKEN pushes do NOT trigger
            # `pull_request` CI — so the release PR never gets checks on its
            # own. Grab its head SHA so the jobs below can run CI for it and
            # report the result back as the required `ci-gate` status.
            -   name: Get release-PR head SHA
                id: get-pr-sha
                if: ${{ steps.release.outputs.prs_created == 'true' }}
                uses: actions/github-script@v7
                env:
                    PRS_OUTPUT: ${{ steps.release.outputs.prs }}
                with:
                    script: |
                        const prsOutput = process.env.PRS_OUTPUT;
                        if (!prsOutput) {
                            console.log('no prs output');
                            return;
                        }
                        let prs;
                        try {
                            prs = JSON.parse(prsOutput);
                        } catch (e) {
                            console.log('could not parse prs output:', e);
                            return;
                        }
                        if (!Array.isArray(prs) || prs.length === 0) {
                            console.log('no prs in output');
                            return;
                        }
                        const prNumber = prs[0].number;
                        const { data: pr } = await github.rest.pulls.get({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: prNumber,
                        });
                        core.setOutput('sha', pr.head.sha);
                        console.log(`release PR #${prNumber} head SHA: ${pr.head.sha}`);

    # Run CI for the release PR (its own `pull_request` event never fires).
    # Runs on this workflow's ref (main HEAD); the release PR is just main +
    # the version-bump commit, so the result is representative.
    ci-for-release-pr:
        needs: release-please
        if: ${{ needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
        uses: ./.github/workflows/ci.yml
        secrets: inherit

    # A called workflow's own job statuses don't attach to the PR, so post the
    # CI result explicitly as the `ci-gate` commit status on the release PR's
    # head SHA — satisfying branch protection's required `ci-gate` check.
    report-ci-status:
        needs: [release-please, ci-for-release-pr]
        if: ${{ always() && needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
        runs-on: ubuntu-latest
        permissions:
            statuses: write
        steps:
            -   name: Report CI status to the release PR
                uses: actions/github-script@v7
                env:
                    SHA: ${{ needs.release-please.outputs.pr_head_sha }}
                    CI_RESULT: ${{ needs.ci-for-release-pr.result }}
                with:
                    script: |
                        const sha = process.env.SHA;
                        const ciResult = process.env.CI_RESULT;
                        if (!sha) {
                            console.log('no sha, skipping status update');
                            return;
                        }
                        const state =
                            ciResult === 'success' ? 'success'
                            : ciResult === 'failure' ? 'failure'
                            : ciResult === 'cancelled' ? 'error'
                            : 'pending';
                        const description =
                            ciResult === 'success' ? 'All CI checks passed'
                            : ciResult === 'failure' ? 'CI checks failed'
                            : ciResult === 'cancelled' ? 'CI was cancelled'
                            : 'CI is running';
                        await github.rest.repos.createCommitStatus({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            sha,
                            state,
                            context: 'ci-gate',
                            description,
                            target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                        });
                        console.log(`set ci-gate=${state} on ${sha}`);

    # When release-please cuts a release (on merge of its PR), build + push the
    # api/worker/fe images to GHCR tagged with the new version. This runs inline
    # in the same workflow run — a `release`-triggered workflow would never fire
    # because release-please publishes the release via GITHUB_TOKEN.
    publish-images:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        permissions:
            contents: read
            packages: write
        uses: ./.github/workflows/docker-publish.yml
        with:
            version: ${{ needs.release-please.outputs.version }}
