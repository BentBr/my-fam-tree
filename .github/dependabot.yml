version: 2
updates:
    - package-ecosystem: cargo
      directory: "/"
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      groups:
          rust-deps:
              patterns:
                  - "*"
    - package-ecosystem: npm
      directory: "/fe"
      schedule:
          interval: weekly
      open-pull-requests-limit: 10
      groups:
          fe-deps:
              patterns:
                  - "*"
    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: monthly
