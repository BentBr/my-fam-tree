local_key = "my-fam-tree"
no_docker_compose = true

# Project-level RDT config. See: https://github.com/BentBr/rusty_dev_tool
[commands]
    [commands.migrate]
        "description" = "Apply pending DB migrations"
        "alias" = "migrate"
        "execution"  = "docker compose run --rm migrator"

    [commands.migrate-status]
        "description" = "Show applied vs pending migrations"
        "alias" = "migrate-status"
        "execution"  = "docker compose run --rm migrator --status"

    [commands.migrate-check]
        "description" = "Exit non-zero if any migrations are pending"
        "alias" = "migrate-check"
        "execution"  = "docker compose run --rm migrator --check"

    [commands.sqlx-prepare]
        "description" = "Regenerate .sqlx/ offline query metadata (requires DATABASE_URL)"
        "alias" = "sqlx-prepare"
        "execution"  = "cargo sqlx prepare --workspace"

    [commands.openapi]
        "description" = "Dump OpenAPI spec to fe/openapi.json and regenerate TS types"
        "alias" = "openapi"
        "execution"  = "cargo run -p my-fam-tree-openapi --bin openapi-dump > fe/openapi.json && ./scripts/fe-in-container.sh openapi-codegen"

    [commands.openapi-check]
        "description" = "Fail if OpenAPI spec drifted from the committed one"
        "alias" = "openapi-check"
        "execution"  = "cargo run -p my-fam-tree-openapi --bin openapi-dump | diff - fe/openapi.json"

    [commands.lint]
        "description" = "Run all linters (rust + fe + file-size)"
        "alias" = "lint"
        "execution"  = "cargo fmt --check && cargo +nightly clippy --workspace --all-targets --all-features -- -D clippy::all -D warnings -D clippy::pedantic -D clippy::nursery && ./scripts/fe-in-container.sh lint && ./scripts/fe-in-container.sh typecheck && ./scripts/fe-in-container.sh knip && ./scripts/check-file-size.sh"

    [commands.test]
        "description" = "Run all unit tests (cargo + playwright component)"
        "alias" = "test"
        "execution"  = "cargo test --workspace && ./scripts/fe-in-container.sh test"

    [commands.test-e2e]
        "description" = "Run Playwright end-to-end tests against running stack"
        "alias" = "test-e2e"
        "execution"  = "./scripts/fe-in-container.sh test:e2e"

    [commands.coverage]
        "description" = "Coverage report (rust via scripts/coverage.sh, fe via playwright/v8)"
        "alias" = "coverage"
        "execution"  = "./scripts/coverage.sh all && ./scripts/fe-in-container.sh coverage"

    [commands.fe]
        "description" = "Start the Vite dev server"
        "alias" = "fe"
        "execution"  = "docker compose up fe"

    [commands.worker]
        "description" = "Run the reminder worker locally"
        "alias" = "worker"
        "execution"  = "cargo run -p my-fam-tree-worker --bin worker"

    [commands.gen-jwt-keys]
        "description" = "Emit a fresh Ed25519 keypair for JWT_PRIVATE_KEY / JWT_PUBLIC_KEYS"
        "alias" = "gen-jwt-keys"
        "execution"  = "cargo run -p my-fam-tree-api --bin gen-jwt-keys"

    [commands.seed]
        "description" = "Run the deterministic seed (idempotent UPSERTs; prints MAGIC_LINK URLs)"
        "alias" = "seed"
        "execution"  = "docker compose run --rm seeder"

    [commands.reset]
        "description" = "Drop all dev volumes and re-migrate + re-seed from scratch"
        "alias" = "reset"
        "execution"  = "docker compose down -v && docker compose up -d postgres redis mailpit && docker compose run --rm migrator && docker compose run --rm seeder"

    [commands.deny]
        "description" = "cargo-deny + cargo-machete supply-chain checks"
        "alias" = "deny"
        "execution"  = "cargo deny check && cargo machete"

    [commands.trigger-clock]
        "description" = "Advance the reminder worker test clock to 06:00 Berlin + tick (see Mailpit). Optional date arg YYYY-MM-DD. Clears that day's digest first so re-runs resend with current data (TRIGGER_CLOCK_KEEP=1 to keep). Needs the worker built with WORKER_FEATURES=test-fixtures."
        "alias" = "trigger-clock"
        "execution"  = "./scripts/trigger-clock.sh"

# Mandatory node
[environments]
