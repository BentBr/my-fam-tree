# nginx reverse-proxy in front of MinIO's S3 API so the api/worker (and the
# browser, on presigned URL redirects) reach object storage at
# `http://minio-api.my-family.docker` — port 80 via dinghy — instead of
# pinning to MinIO's internal :9000. Lets us swap MinIO for real S3 later
# by only changing STORAGE_ENDPOINT_URL.
#
# `client_max_body_size 0` disables nginx's default 1 MB request cap so
# multi-megabyte photo uploads pass through unmodified; the size guard
# lives in the API handler.
server {
    listen 8080;

    location / {
        proxy_pass http://minio.my-family.docker:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 0;
        proxy_buffering off;
    }
}
