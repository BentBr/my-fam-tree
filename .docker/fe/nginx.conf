server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml application/javascript
               application/json image/svg+xml application/manifest+json;

    # ---- Baseline security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Asset caching ----
    # Vite emits hashed filenames in /assets/*-[hash].(js|css|webp|png|...).
    # Those are immutable: changing the source changes the hash, which
    # changes the URL, which forces a fresh fetch. Year-long immutable
    # cache is safe. ALL user-visible imagery (sloth-*.webp,
    # sloth-family-960.webp, tree-example-*.webp, og-1200x630.png) lives
    # here — the components import them from `@/assets/brand/` so Vite
    # bundles + hashes the URL at build time.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The brand directory holds only the NON-hashed favicons + apple-touch
    # icon (`favicon-{16,32,48}.png`, `favicon.ico`, `apple-touch-icon.png`).
    # Their URLs are hardcoded in index.html `<link>` tags, so they can't
    # be content-hashed without rewriting index.html from a Vite plugin.
    # One-hour cache + must-revalidate keeps a favicon refresh visible
    # within a tight window without burning the year-long cache the
    # hashed bundles enjoy.
    location ^~ /brand/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        try_files $uri =404;
    }

    # Sitemap + robots — frequently fetched by crawlers; short cache so
    # updates roll out quickly without per-request lookups.
    location = /sitemap.xml { add_header Cache-Control "public, max-age=3600"; }
    location = /sitemap_en.xml { add_header Cache-Control "public, max-age=3600"; }
    location = /sitemap_de.xml { add_header Cache-Control "public, max-age=3600"; }
    location = /robots.txt    { add_header Cache-Control "public, max-age=3600"; }

    # Legal pages must NOT be indexed. `X-Robots-Tag` is the HTTP-level
    # mirror of each page's `<meta name="robots" content="noindex,nofollow">`
    # — defence in depth in case the meta tag is ever stripped by a proxy.
    location = /imprint     { add_header X-Robots-Tag "noindex, nofollow" always; try_files $uri /index.html; }
    location = /data-policy { add_header X-Robots-Tag "noindex, nofollow" always; try_files $uri /index.html; }

    # The SPA shell. `no-cache` on `index.html` so the browser always
    # re-checks for new hashed-asset URLs inside; the asset URLs change
    # whenever source changes, so the immutable cache above + a fresh
    # index.html together force the right fetches without ever serving
    # stale code.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Liveness probe — same path the API uses, so an upstream LB can
    # treat both services identically.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}
