[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
yanked = "deny"
ignore = [
    # RUSTSEC-2023-0071 — Marvin Attack timing sidechannel in the `rsa` crate.
    # Pulled in transitively via jsonwebtoken 10.x's rust_crypto feature, but
    # we only sign/verify Ed25519 — the RSA path is dead code in our binary.
    # No fix available upstream. Re-evaluate when the rsa crate ships a
    # constant-time release.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0098/0099/0104 — three rustls-webpki 0.101.x bugs around
    # name-constraint handling and a panic in CRL parsing. Reachable only if
    # an attacker controls the TLS peer's certificate. Pulled in via
    # aws-sdk-s3 → aws-smithy-http-client 1.1.x → hyper-rustls 0.24 →
    # rustls 0.21 → rustls-webpki 0.101. We talk plain HTTP to MinIO in dev
    # and CA-issued TLS to real AWS in prod — no attacker-controlled cert
    # path. Drop these when aws-smithy-http-client ships with rustls ≥ 0.23
    # (which carries webpki ≥ 0.103.12).
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
# BUSL-1.1 is our own workspace licence; the rest are third-party deps.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "BUSL-1.1",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
# Duplicate transitive versions are inevitable while ed25519-dalek 2.x pins
# rand_core 0.6 — bumping rand to 0.9 introduces a second rand_core, and
# windows-sys / hashbrown / sha2 / etc. all spread across versions through
# the ecosystem. None of these are security or correctness concerns. Promote
# back to "warn" once we're on ed25519-dalek 3.x and can dedupe.
multiple-versions = "allow"
wildcards = "deny"
# Our workspace crates use `path = "..."` with no `version = "..."` field.
# Cargo treats those as wildcard deps. Allow only path-based wildcards so
# external `crate = "*"` still trips the check.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
