[graph]
all-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
yanked = "deny"

[licenses]
# BUSL-1.1 is our own workspace license; the rest are third-party deps.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "BUSL-1.1",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our workspace crates use `path = "..."` with no `version = "..."` field.
# Cargo treats those as wildcard deps. Allow only path-based wildcards so
# external `crate = "*"` still trips the check.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
