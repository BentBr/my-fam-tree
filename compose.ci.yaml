# Use with: docker compose -f compose.yaml -f compose.ci.yaml up -d
# Re-adds host port bindings to every service that no longer has them under
# the dinghy-routed setup. The api/worker pick `localhost`-based URLs from
# environment overrides set in the calling shell or CI workflow.
services:
    redis:
        ports:
            - "6379:6379"
    mailpit:
        ports:
            - "1025:1025"
            - "8025:8025"
        environment:
            VIRTUAL_HOST: ""
    api:
        ports:
            - "8080:8080"
        environment:
            API_PUBLIC_URL: http://localhost:8080
            WEB_PUBLIC_URL: http://localhost:5173
            CORS_ALLOWED_ORIGINS: http://localhost:5173
            COOKIE_DOMAIN: ""
            VIRTUAL_HOST: ""
    reminder-worker:
        ports:
            - "9091:9091"
        environment:
            VIRTUAL_HOST: ""
    fe:
        ports:
            - "5173:5173"
        environment:
            VITE_API_BASE_URL: http://localhost:8080
            VITE_API_PROXY_TARGET: http://api.my-family.docker:8080
            VIRTUAL_HOST: ""
