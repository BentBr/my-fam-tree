name: my-family

x-rust-env: &rust_env
    APP_ENV: development
    RUST_LOG: info,my_family=debug
    LOG_FORMAT: pretty
    DATABASE_URL: postgres://my_family:my_family@postgres.my-family.docker:5432/my_family
    DATABASE_MAX_CONNECTIONS: 20
    DATABASE_ACQUIRE_TIMEOUT_SECONDS: 5
    DATABASE_STATEMENT_TIMEOUT_MS: 30000
    REDIS_URL: redis://redis.my-family.docker:6379/0
    REDIS_MAX_CONNECTIONS: 10
    REDIS_KEY_PREFIX: "my-family:"
    EMAIL_DSN: smtp://mail.my-family.docker:1025
    EMAIL_FROM_NAME: my-family
    EMAIL_FROM_ADDRESS: no-reply@my-family.local
    EMAIL_TIMEOUT_SECONDS: 10
    WEB_PUBLIC_URL: http://my-family.docker
    WORKER_TICK_INTERVAL_SECONDS: 300
    WORKER_LEADER_LEASE_SECONDS: 60
    WORKER_LEADER_REFRESH_SECONDS: 20
    WORKER_MAX_RETRIES: 5
    WORKER_RETRY_BACKOFF_MIN_SECONDS: 60
    WORKER_RETRY_BACKOFF_MAX_SECONDS: 43200
    WORKER_METRICS_BIND: 0.0.0.0:9091
    WORKER_JANITOR_INTERVAL_SECONDS: 300
    WORKER_JANITOR_GRACE_SECONDS: 86400
    WORKER_OUTBOX_POLL_SECONDS: 1
    WORKER_OUTBOX_POOL_SIZE: 4
    # Object storage (person photos). Dev uses MinIO; prod points at S3.
    STORAGE_DRIVER: s3
    STORAGE_BUCKET: my-family
    STORAGE_REGION: us-east-1
    STORAGE_ENDPOINT_URL: http://minio-api.my-family.docker
    STORAGE_ACCESS_KEY_ID: minioadmin
    STORAGE_SECRET_ACCESS_KEY: minioadmin
    STORAGE_FORCE_PATH_STYLE: "true"

services:
    postgres:
        image: postgres:18-alpine
        environment:
            POSTGRES_USER: my_family
            POSTGRES_PASSWORD: my_family
            POSTGRES_DB: my_family
        # Host port 3458 → container 5432. The only host port binding in this stack.
        ports:
            - "3458:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U my_family" ]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            my-family:
                aliases:
                    - postgres.my-family.docker

    redis:
        image: redis:7-alpine
        # No host binding. Services reach it via `redis:6379` on the compose network.
        volumes:
            - redis-data:/data
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            my-family:
                aliases:
                    - redis.my-family.docker

    mailpit:
        image: axllent/mailpit:latest
        environment:
            # Dinghy reverse-proxy routing for the web UI (SMTP stays internal).
            VIRTUAL_HOST: mail.my-family.docker
            VIRTUAL_PORT: "8025"
        healthcheck:
            test: [ "CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info" ]
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            my-family:
                aliases:
                    - mail.my-family.docker

    # S3-compatible object store for person photos.
    # Dev/CI use MinIO; prod points STORAGE_ENDPOINT_URL at AWS S3 directly.
    #
    # Two-service layout mirrors ugg-orkestra:
    # - `minio` runs the S3 API on :9000 and the operator console on :9001;
    #   dinghy exposes the CONSOLE at `http://minio.my-family.docker` so the
    #   bare hostname doesn't redirect the browser to a port that the proxy
    #   isn't bound to.
    # - `minio-api` is a tiny nginx in front of the S3 API on :9000, exposed
    #   at `http://minio-api.my-family.docker`. The api/worker write through
    #   the proxy so presigned URLs work over port 80 without leaking :9000.
    #
    # The entrypoint auto-creates the bucket + flips it to anonymous-download
    # so presigned GETs work; idempotent across restarts.
    minio:
        image: minio/minio:latest
        entrypoint: >
            sh -c "
            minio server /data --console-address ':9001' &
            until mc ready local; do sleep 1; done &&
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/my-family &&
            mc anonymous set download local/my-family &&
            wait
            "
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
            VIRTUAL_HOST: minio.my-family.docker
            VIRTUAL_PORT: "9001"
        volumes:
            - minio-data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 5s
            timeout: 5s
            retries: 20
        networks:
            my-family:
                aliases:
                    - minio.my-family.docker

    # nginx reverse-proxy fronting the S3 API on :9000 so consumers reach
    # MinIO through `http://minio-api.my-family.docker` (port 80). The api
    # talks to the same hostname from INSIDE the docker network (same network
    # alias resolves to this container directly on port 80) so the SigV4
    # signature the SDK computes is valid no matter who follows the resulting
    # presigned URL. Using plain nginx (vs nginx-unprivileged) because the
    # unprivileged image refuses to bind <1024.
    minio-api:
        image: nginx:1.27-alpine
        depends_on:
            minio:
                condition: service_healthy
        volumes:
            - ./.docker/local/conf/minio-api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
        environment:
            VIRTUAL_HOST: minio-api.my-family.docker
            VIRTUAL_PORT: "80"
        networks:
            my-family:
                aliases:
                    - minio-api.my-family.docker

    migrator:
        build:
            context: .
            dockerfile: .docker/migrator.Dockerfile
        environment: *rust_env
        depends_on:
            postgres:
                condition: service_healthy
        restart: "no"
        networks:
            my-family:
                aliases:
                    - migrator.my-family.docker

    seeder:
        # Dedicated dev/CI image — production api/worker images never include
        # the seed binary. Source lives in `crates/seeder/` (not `crates/api`).
        build:
            context: .
            dockerfile: .docker/seeder.Dockerfile
        environment:
            <<: *rust_env
            # JWT keys aren't read by the seed binary itself (no token issuance),
            # but `Config::load_from_env` validates them. Reuse the same env
            # discipline as the api service so a missing key surfaces immediately.
            JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY required; run rdt gen-jwt-keys}
            JWT_PRIVATE_KEY_ID: ${JWT_PRIVATE_KEY_ID:?JWT_PRIVATE_KEY_ID required}
            JWT_PUBLIC_KEYS: ${JWT_PUBLIC_KEYS:?JWT_PUBLIC_KEYS required}
            JWT_ISSUER: my-family
            JWT_AUDIENCE: my-family-app
            JWT_ACCESS_TTL_SECONDS: 900
            JWT_REFRESH_TTL_SECONDS: 2592000
            JWT_REFRESH_ABSOLUTE_TTL_SECONDS: 7776000
            MAGIC_LINK_TTL_SECONDS: 900
            INVITE_TTL_SECONDS: 1209600
            MAGIC_LINK_RATE_PER_EMAIL_PER_HOUR: 5
            MAGIC_LINK_RATE_PER_IP_PER_HOUR: 20
            API_HOST: 0.0.0.0
            API_PORT: 8080
            API_PUBLIC_URL: http://api.my-family.docker
            CORS_ALLOWED_ORIGINS: http://my-family.docker
            API_ENABLE_DOCS: "false"
            API_METRICS_BIND: 0.0.0.0:9090
            COOKIE_DOMAIN: .my-family.docker
            COOKIE_SECURE: "false"
            COOKIE_SAMESITE_ACCESS: Lax
            COOKIE_SAMESITE_REFRESH: Strict
        depends_on:
            migrator:
                condition: service_completed_successfully
        restart: "no"
        networks:
            my-family:
                aliases:
                    - seeder.my-family.docker

    api:
        build:
            context: .
            dockerfile: .docker/api.Dockerfile
        environment:
            <<: *rust_env
            MAIN_SERVICE: rust
            API_HOST: 0.0.0.0
            API_PORT: 8080
            API_PUBLIC_URL: http://api.my-family.docker
            CORS_ALLOWED_ORIGINS: http://my-family.docker
            API_ENABLE_DOCS: "true"
            API_METRICS_BIND: 0.0.0.0:9090
            COOKIE_DOMAIN: .my-family.docker
            COOKIE_SECURE: "false"
            COOKIE_SAMESITE_ACCESS: Lax
            COOKIE_SAMESITE_REFRESH: Strict
            VIRTUAL_HOST: api.my-family.docker
            VIRTUAL_PORT: "8080"
            # JWT keys MUST be set by the operator before bringing the stack up.
            # Run `cargo run -p my-family-api --bin gen-jwt-keys` (or `rdt gen-jwt-keys`)
            # to generate a fresh keypair and append it to `.env`.
            JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY required; run rdt gen-jwt-keys}
            JWT_PRIVATE_KEY_ID: ${JWT_PRIVATE_KEY_ID:?JWT_PRIVATE_KEY_ID required}
            JWT_PUBLIC_KEYS: ${JWT_PUBLIC_KEYS:?JWT_PUBLIC_KEYS required}
            JWT_ISSUER: my-family
            JWT_AUDIENCE: my-family-app
            JWT_ACCESS_TTL_SECONDS: 900
            JWT_REFRESH_TTL_SECONDS: 2592000
            JWT_REFRESH_ABSOLUTE_TTL_SECONDS: 7776000
            MAGIC_LINK_TTL_SECONDS: 900
            INVITE_TTL_SECONDS: 1209600
            MAGIC_LINK_RATE_PER_EMAIL_PER_HOUR: 5
            MAGIC_LINK_RATE_PER_IP_PER_HOUR: 20
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            mailpit:
                condition: service_healthy
            migrator:
                condition: service_completed_successfully
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1" ]
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            my-family:
                aliases:
                    - api.my-family.docker

    worker:
        build:
            context: .
            dockerfile: .docker/worker.Dockerfile
            args:
                # Empty in normal dev/prod; set WORKER_FEATURES=test-fixtures
                # for E2E to build the clock-advance listener on :9091.
                CARGO_FEATURES: ${WORKER_FEATURES:-}
        environment:
            <<: *rust_env
            # `clock.my-family.docker` is a friendly alias for the test-fixtures
            # clock-advance endpoint (used by `rdt trigger-clock`). Only routable
            # when the worker is built with WORKER_FEATURES=test-fixtures.
            VIRTUAL_HOST: worker.my-family.docker,clock.my-family.docker
            VIRTUAL_PORT: "9091"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrator:
                condition: service_completed_successfully
        networks:
            my-family:
                aliases:
                    - worker.my-family.docker

    fe:
        image: node:22-alpine
        working_dir: /app
        # Activate the pnpm version pinned in fe/package.json's `packageManager`
        # field via corepack. `CI=true` prevents pnpm@10's interactive
        # confirm-purge prompt when it detects a node_modules layout from a
        # different major (no TTY available in compose `command:`).
        # CI uses `pnpm install --frozen-lockfile` (Phase 0e) once the lockfile exists.
        command: sh -c "corepack enable && corepack prepare pnpm@10.33.4 --activate && pnpm install && pnpm dev"
        # `expose:` makes port 5173 visible to dinghy on the docker network
        # without binding it on the host (the node:22-alpine image has no
        # EXPOSE directive of its own). Dinghy reads this to route
        # http://*.my-family.docker → container:5173.
        expose:
            - "5173"
        environment:
            CI: "true"
            # FE issues same-origin `/api/*` requests; Vite proxies them to the
            # api service via the compose service alias (port 8080). We do NOT
            # set VITE_API_BASE_URL so the browser bypass-path (absolute URL to
            # api.my-family.docker:80) is never used — that only resolved from
            # the host via dinghy, not from in-network Playwright.
            VITE_API_PROXY_TARGET: http://api:8080
            VIRTUAL_HOST: my-family.docker
            VIRTUAL_PORT: "5173"
            PNPM_HOME: /pnpm
            PATH: /pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        volumes:
            - ./fe:/app
        depends_on:
            # `service_started` (not `service_healthy`): the Vite dev server can
            # come up before the API is fully ready — its proxy resolves
            # `/api/*` at request time. Waiting on api's health adds 10–20s to
            # each `docker compose up` for no benefit.
            api:
                condition: service_started
        networks:
            my-family:
                aliases:
                    - my-family.docker

    playwright:
        # Pin must match @playwright/test resolved in fe/pnpm-lock.yaml (1.60.0).
        image: mcr.microsoft.com/playwright:v1.60.0-noble
        working_dir: /app
        # Mount the FE source so the same tests + page objects + fixtures are
        # used in CI as in local dev. The playwright deps live in a separate
        # named volume to keep them out of the host-bound fe/node_modules
        # (which is populated for the user's IDE by the `fe` service).
        volumes:
            - ./fe:/app
            - fe-playwright-node-modules:/app/node_modules
        command: sh -c "corepack enable && corepack prepare pnpm@10.33.4 --activate && pnpm install && pnpm exec playwright install chromium && tail -f /dev/null"
        # Resolves *.my-family.docker via the network aliases of other services.
        environment:
            CI: "true"
            E2E_BASE_URL: http://my-family.docker:5173
            E2E_API_BASE_URL: http://api.my-family.docker:8080
            MAILPIT_URL: http://mail.my-family.docker:8025
        depends_on:
            fe:
                condition: service_started
            api:
                condition: service_started
        networks:
            my-family:
                aliases:
                    - playwright.my-family.docker

volumes:
    postgres-data:
    redis-data:
    minio-data:
    fe-playwright-node-modules:

networks:
    my-family:
